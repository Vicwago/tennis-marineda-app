<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#060d1a" />
    <meta name="description" content="Gestión de rankings de Pádel y Tenis — Escuela de Tenis Marineda" />
    <meta name="application-name" content="Marineda" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Marineda" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>Escuela de Tenis Marineda</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Limpiar Service Workers obsoletos automáticamente -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          registrations.forEach(function(r) { r.unregister(); });
        });
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

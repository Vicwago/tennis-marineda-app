<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#060d1a" />
    <meta name="description" content="Gestión de rankings de Pádel y Tenis — Escuela de Tenis Marineda" />
    <meta name="application-name" content="Marineda" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Marineda" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Favicon + Manifest -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Anti-cache meta tags -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <title>Escuela de Tenis Marineda</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Limpiar Service Workers, caches obsoletos, y auto-actualizar si hay versión nueva -->
    <script>
      // 1. Limpiar SW
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
      }
      // 2. Limpiar caches API
      if ('caches' in window) {
        caches.keys().then(function(keys) {
          keys.forEach(function(k) { caches.delete(k); });
        });
      }
      // 3. Auto-actualizar: comprobar si el HTML cargado es el más reciente
      (function() {
        var BUILD_VERSION = 'v2026-03-26-4';
        var vKey = 'app_version';
        var stored = localStorage.getItem(vKey);
        if (stored && stored !== BUILD_VERSION) {
          localStorage.setItem(vKey, BUILD_VERSION);
          // Forzar recarga saltándose caché del navegador
          location.href = location.pathname + '?_=' + Date.now();
          return;
        }
        localStorage.setItem(vKey, BUILD_VERSION);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

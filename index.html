<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#060d1a" />
    <meta name="description" content="Gestión de rankings de Pádel y Tenis — Escuela de Tenis Marineda" />
    <meta name="application-name" content="Marineda" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Marineda" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Favicon + Manifest -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <title>Escuela de Tenis Marineda</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Limpiar Service Workers y caches obsoletos -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          var hadSW = regs.length > 0;
          regs.forEach(function(r) { r.unregister(); });
          if ('caches' in window) {
            caches.keys().then(function(keys) {
              keys.forEach(function(k) { caches.delete(k); });
              // Si había un SW activo, recargar para obtener código fresco
              if (hadSW && !sessionStorage.getItem('sw_cleared')) {
                sessionStorage.setItem('sw_cleared', '1');
                location.reload();
              }
            });
          }
        });
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
